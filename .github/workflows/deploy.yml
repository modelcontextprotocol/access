name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PULUMI_VERSION: "3.197.0"

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Pulumi
        uses: pulumi/actions@v6
        with:
          pulumi-version: ${{ env.PULUMI_VERSION }}

      - name: Cache Pulumi plugins
        uses: actions/cache@v4
        with:
          path: ~/.pulumi/plugins
          key: pulumi-plugins-${{ hashFiles('Pulumi.yaml') }}
          restore-keys: |
            pulumi-plugins-

      - name: Install Pulumi packages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pulumi install

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_PROD_SERVICE_ACCOUNT_KEY }}

      - name: Deploy to Production
        env:
          PULUMI_PASSPHRASE: ${{ secrets.PULUMI_PROD_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets.PULUMI_GITHUB_TOKEN }}
          ORG_BILLING_EMAIL: ${{ secrets.ORG_BILLING_EMAIL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: |
          echo "$PULUMI_PASSPHRASE" > passphrase.prod.txt
          export PULUMI_CONFIG_PASSPHRASE_FILE=passphrase.prod.txt
          pulumi login gs://mcp-access-prod-pulumi-state
          # TEMP: drop stale state for renamed repo (experimental-ext-tasks -> ext-tasks, #125).
          # Delete-on-up 404s because the old repo name is gone. Remove after one successful deploy.
          pulumi state delete 'urn:pulumi:prod::mcp-access::github:index/repositoryCollaborators:RepositoryCollaborators::repo-experimental-ext-tasks' --stack prod --yes || true
          pulumi config set discord:guildId "$DISCORD_GUILD_ID" --stack prod
          pulumi config set discord:botToken "$DISCORD_BOT_TOKEN" --secret --stack prod
          pulumi config set githubBillingEmail "$ORG_BILLING_EMAIL" --secret --stack prod
          # TEMP (#133): two GroupMember records (external-email members of the
          # maintainers group) are recorded in state with an empty member ID
          # ("groups/04f1mdlm38smb30/members/"), so every deploy plans a replace
          # whose create step 409s ("Member already exists") against the live
          # membership and aborts the whole update. Repair the state by dropping
          # the broken records and re-importing the live memberships by member
          # email (the Directory API accepts an email as the member key; the
          # provider then stores the numeric member ID). --protect=false keeps
          # the imported records deletable, like every other GroupMember.
          # The five other records that were corrupted alongside these two were
          # already healed by the (otherwise failed) 2026-07-02 deploy run and
          # need no action here. Remove this block after one successful deploy.
          pulumi state delete 'urn:pulumi:prod::mcp-access::googleworkspace:index/groupMember:GroupMember::bob.dickinson@gmail.com-maintainers' --stack prod --yes || true
          pulumi state delete 'urn:pulumi:prod::mcp-access::googleworkspace:index/groupMember:GroupMember::chugh.tapan@gmail.com-maintainers' --stack prod --yes || true
          pulumi import googleworkspace:index/groupMember:GroupMember 'bob.dickinson@gmail.com-maintainers' 'groups/04f1mdlm38smb30/members/bob.dickinson@gmail.com' --stack prod --yes --protect=false || true
          pulumi import googleworkspace:index/groupMember:GroupMember 'chugh.tapan@gmail.com-maintainers' 'groups/04f1mdlm38smb30/members/chugh.tapan@gmail.com' --stack prod --yes --protect=false || true
          make up
